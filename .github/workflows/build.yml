name: Build

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-14
            target: aarch64-apple-darwin
            bundles: dmg
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: nsis

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Download ffmpeg sidecar (macOS arm64)
        if: matrix.platform == 'macos-14'
        run: |
          brew install ffmpeg
          mkdir -p src-tauri/binaries
          cp "$(which ffmpeg)" src-tauri/binaries/ffmpeg-aarch64-apple-darwin
          cp "$(which ffprobe)" src-tauri/binaries/ffprobe-aarch64-apple-darwin
          chmod +x src-tauri/binaries/ffmpeg-aarch64-apple-darwin
          chmod +x src-tauri/binaries/ffprobe-aarch64-apple-darwin

      - name: Download ffmpeg sidecar (Windows x64)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $url = "https://github.com/BtbN/FFmpeg-Builds/releases/latest/download/ffmpeg-master-latest-win64-gpl.zip"
          Invoke-WebRequest -Uri $url -OutFile "$env:TEMP\ffmpeg.zip"
          Expand-Archive -Path "$env:TEMP\ffmpeg.zip" -DestinationPath "$env:TEMP\ffmpeg_build"
          $ffmpeg = (Get-ChildItem -Path "$env:TEMP\ffmpeg_build" -Filter "ffmpeg.exe" -Recurse | Select-Object -First 1).FullName
          $ffprobe = (Get-ChildItem -Path "$env:TEMP\ffmpeg_build" -Filter "ffprobe.exe" -Recurse | Select-Object -First 1).FullName
          New-Item -ItemType Directory -Force -Path "src-tauri\binaries" | Out-Null
          Copy-Item $ffmpeg -Destination "src-tauri\binaries\ffmpeg-x86_64-pc-windows-msvc.exe"
          Copy-Item $ffprobe -Destination "src-tauri\binaries\ffprobe-x86_64-pc-windows-msvc.exe"

      - name: Build
        run: npm run tauri build -- --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload DMG (macOS)
        if: matrix.platform == 'macos-14'
        uses: actions/upload-artifact@v4
        with:
          name: Lecture-Doc-macOS-dmg
          path: src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg

      - name: Upload installer (Windows)
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: Lecture-Doc-Windows-exe
          path: src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
